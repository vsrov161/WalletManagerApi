<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>WalletAPI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1f2f67 0%, #16213b 50%, #121b34 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Header Section */
        .hero-section {
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(ellipse at 50% 0%, rgba(79, 70, 229, 0.15), transparent 70%);
        }

        .hero-title {
            font-size: 48px;
            font-weight: bold;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .hero-subtitle {
            font-size: 21px;
            font-weight: 600;
            color: #818cf8;
            margin-bottom: 0;
        }

        .hero-subtitle a {
            color: #a78bfa;
            text-decoration: none;
            border-bottom: 2px solid #4f46e5;
            transition: all 0.3s ease;
        }

        .hero-subtitle a:hover {
            color: #c4b5fd;
            border-bottom-color: #818cf8;
        }

        /* Tech Section */
        .tech-section {
            padding: 60px 20px 80px;
        }

        .section-title {
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 32px;
            margin-bottom: 50px;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .tech-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tech-card {
            background: rgba(30, 35, 55, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 25px;
            text-align: center;
            min-width: 180px;
            transition: all 0.3s ease;
            border: 1px solid rgba(129, 140, 248, 0.2);
        }

        .tech-card:hover {
            transform: translateY(-8px);
            border-color: rgba(129, 140, 248, 0.5);
            background: rgba(40, 45, 70, 0.8);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .tech-emoji {
            font-size: 48px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .tech-name {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin: 0;
        }

        /* Footer */
        .footer {
            background: #070b14;
            text-align: center;
            padding: 50px 20px;
            border-top: 1px solid rgba(129, 140, 248, 0.1);
        }

        .footer-text {
            color: #6b7280;
            font-weight: 600;
            font-size: 17px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 32px;
            }

            .hero-subtitle {
                font-size: 16px;
            }

            .section-title {
                font-size: 24px;
            }

            .tech-name {
                font-size: 18px;
            }

            .tech-emoji {
                font-size: 36px;
            }

            .tech-card {
                padding: 20px;
                min-width: 140px;
            }
        }

        @media (max-width: 480px) {
            .hero-section {
                padding: 50px 20px;
            }

            .tech-grid {
                gap: 15px;
            }
        }
    </style>
</head>

<body>
<!-- Hero Section -->
<section class="hero-section">
    <div class="container">
        <h1 class="hero-title">🚀 Wallet API Server is up and running</h1>
        <p class="hero-subtitle">
            📡 Check API on <a href="http://localhost:8085/api/v1/wallets" target="_blank">localhost:8085/api/v1/wallets</a>
        </p>
    </div>
</section>

<!-- Tech Section -->
<section class="tech-section">
    <h2 class="section-title">⚙️ Tech Specs</h2>
    <div class="tech-grid">
        <div class="tech-card">
            <div class="tech-emoji">🍃</div>
            <h3 class="tech-name">Spring Boot</h3>
        </div>
        <div class="tech-card">
            <div class="tech-emoji">☕</div>
            <h3 class="tech-name">Java 17</h3>
        </div>
        <div class="tech-card">
            <div class="tech-emoji">🐘</div>
            <h3 class="tech-name">PostgreSQL</h3>
        </div>
        <div class="tech-card">
            <div class="tech-emoji">🔄</div>
            <h3 class="tech-name">Liquibase</h3>
        </div>
    </div>
</section>

<!-- Footer -->
<footer class="footer">
    <p class="footer-text">Made with Bootstrap Studio by Vic Sergeev © 2026</p>
</footer>
</body>

</html>
